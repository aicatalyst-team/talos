name: Setup Go
description: Set up Go toolchain and caches. Called internally by Go composite actions.
inputs:
  go-version-file:
    description: Path to go.mod for version detection
    default: "go.mod"
  cache-version:
    description: Cache version; bump to invalidate all caches
    default: "v6"
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        check-latest: true
        cache: true
        cache-dependency-path: |
          go.sum
          tools/go.sum

    - name: Add golangci-lint to PATH
      shell: bash
      working-directory: .
      run: dirname "$(go tool -n golangci-lint)" >> "$GITHUB_PATH"

    - name: Generate code
      if: steps.cache-generated.outputs.cache-hit != 'true'
      shell: bash
      working-directory: .
      run: rm -rf internal/persistence/sqlc/generated && make generate
